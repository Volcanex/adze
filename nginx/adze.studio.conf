server {
    listen 80;
    listen [::]:80;
    server_name adze.studio www.adze.studio;

    root /home/gabriel/adze/output;

    # Artist assets
    location ~ ^/artists/([^/]+)/assets/ {
        alias /home/gabriel/adze/output/$1/assets/;
        expires 24h;
        add_header Cache-Control "public, max-age=86400";
    }

    # Static assets (logo etc)
    location /static/ {
        alias /home/gabriel/adze/static/;
        expires 24h;
    }

    # API and dashboard
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 50M;
    }

    # Artist preview routes
    location /artists/ {
        try_files $uri $uri/ @proxy;
    }

    # Root → dashboard login
    location = / {
        return 302 /api/adze/dashboard;
    }

    location @proxy {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
