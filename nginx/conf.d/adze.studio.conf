server {
    listen 80;
    listen [::]:80;
    server_name adze.studio www.adze.studio;

    # ACME challenge for certbot (needed before SSL is active)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    server_name adze.studio www.adze.studio;

    root /app/output;

    # Static assets
    location /static/ {
        alias /app/static/;
        expires 24h;
    }

    # Dashboard
    location = /dashboard {
        proxy_pass http://flask:5001/api/adze/dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root → dashboard
    location = / {
        return 302 /dashboard;
    }

    # Docs
    location = /docs {
        proxy_pass http://flask:5001/api/adze/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://flask:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 50M;
    }

    # Artist sites — serve static, fall back to Flask
    location /artists/ {
        try_files $uri $uri/index.html @proxy;
        expires 1h;
    }

    location @proxy {
        proxy_pass http://flask:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/adze.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adze.studio/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
