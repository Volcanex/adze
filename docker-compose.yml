services:

  flask:
    build: .
    container_name: adze-flask
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"          # host nginx proxies adze.studio to this
    volumes:
      # Source code — mounted so changes take effect on restart, no rebuild needed
      - ./_shared:/app/_shared
      - ./flask_server.py:/app/flask_server.py
      - ./compile.py:/app/compile.py
      # Data — persisted on host
      - ./artists:/app/artists
      - ./output:/app/output
      - ./static:/app/static
      - ./logs:/app/logs
      - ./_vibe_sessions:/app/_vibe_sessions  # vibe_agent conversation history
      - ./nginx/sites-available:/app/nginx/sites-available
      - claude_auth:/root/.claude
    environment:
      - DEV_ADMIN_TOKEN=${DEV_ADMIN_TOKEN}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}


volumes:
  claude_auth:    # claude login session — survives container rebuilds
